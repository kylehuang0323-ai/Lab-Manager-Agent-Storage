<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Manager — 库存管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a; color: #e2e8f0;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh;
        }
        .welcome {
            text-align: center; padding: 2rem;
        }
        .welcome h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        .welcome p { color: #94a3b8; font-size: 1.1rem; }
        .status {
            margin-top: 1.5rem; padding: 0.8rem 1.5rem;
            background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3);
            border-radius: 12px; color: #4ade80; font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="welcome">
        <h1>📦 Lab Manager Agent</h1>
        <p>智能库存管理系统</p>
        <div class="status">✅ 服务运行中 — 等待功能模块接入</div>
    </div>
</body>
</html>
